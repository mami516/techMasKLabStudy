<!DOCTYPE html>
<html>
<head>
                <style>.lw { font-size: 60px; font-family: Arial, Helvetica, sans-serif; }</style>

            <body>
                


    <meta charset="UTF-8">
    <title>プロフィール作成</title>




<h1>プロフィール作成</h1>

<form>

<table border="1">

    <tbody><tr>
        <td>名前（全角）</td>
        <td>
            <input type="text" name="name" value="大久保真実">
        </td>
    </tr>

    <tr>
        <td>カナ（半角）</td>
        <td>
            <input type="text" name="kana" value="ｵｵｸﾎﾞﾏﾐ" pattern="[A-Za-z0-9 ]*">
        </td>
    </tr>

    <tr>
        <td>年齢（1～100）</td>
        <td>
            <input type="number" name="age" min="1" max="100" value="22">
        </td>
    </tr>

    <tr>
        <td>自己紹介（100文字まで）</td>
        <td>
            <textarea name="intro" maxlength="100">ダンスが好きです。</textarea>
        </td>
    </tr>

    <tr>
        <td>出身地（都道府県）</td>
        <td>
            <select name="prefecture">
                <option>北海道</option>
                <option>青森県</option>
                <option>岩手県</option>
                <option>宮城県</option>

                <option>山形県</option>
                <option>福島県</option>
                <option>茨城県</option>
                <option>栃木県</option>
                <option>群馬県</option>
                <option>埼玉県</option>
                <option>千葉県</option>
                <option>東京都</option>
                <option>神奈川県</option>
                <option>新潟県</option>
                <option>富山県</option>
                <option>石川県</option>
                <option>福井県</option>
                <option>山梨県</option>
                <option>長野県</option>
                <option>岐阜県</option>
                <option>静岡県</option>
                <option>愛知県</option>
                <option>三重県</option>
                <option>滋賀県</option>
                <option>京都府</option>
                <option selected="">大阪府</option>
                <option>兵庫県</option>
                <option>奈良県</option>
                <option>和歌山県</option>
                <option>鳥取県</option>
                <option>島根県</option>
                <option>岡山県</option>
                <option>広島県</option>
                <option>山口県</option>
                <option>徳島県</option>
                <option>香川県</option>
                <option>愛媛県</option>
                <option>高知県</option>
                <option>福岡県</option>
                <option>佐賀県</option>
                <option>長崎県</option>
                <option>熊本県</option>
                <option>大分県</option>
                <option>宮崎県</option>
                <option>鹿児島県</option>
                <option>沖縄県</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>性別</td>
        <td>
            <input type="radio" name="gender" checked="">男
            <input type="radio" name="gender">女
        </td>
    </tr>

    <tr>
        <td>趣味</td>
        <td>
            <input type="checkbox" checked="">映画
            <input type="checkbox">釣り
            <input type="checkbox">読書
            <input type="checkbox" checked="">カラオケ
            <input type="checkbox">ボーリング
        </td>
    </tr>

    <tr>
        <td>生年月日</td>
        <td>
            <input type="date" min="1980-01-01" max="2021-01-01" value="2003-05-16">
        </td>
    </tr>

    <tr>
        <td>パスワード</td>
        <td>
            <input type="password" maxlength="5" value="mami5">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <input type="submit" value="確定">
        </td>
    </tr>

</tbody></table>

</form>
