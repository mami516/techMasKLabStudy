<!DOCTYPE html>
<html>
<head>
                <style>.lw { font-size: 60px; font-family: Arial, Helvetica, sans-serif; }</style>
            </head>
            <body>
                


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>grid課題</title>

<style>

/* CSS変数 */
:root{
    --my-cool-background: #73a4f4;
}

.wrapper_1{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;

    grid-template-rows:
      80px
      80px
      80px
      80px
      80px;

    gap: 10px;
}

/* 共通 */
.wrapper_1 div{
    background: var(--my-cool-background);
    text-align: center;
    line-height: 80px;
}

/* 1行目 */
.box1{
    grid-column-start: 1;
    grid-column-end: 4;
}

/* 5行目 */
.box9{
    grid-column-start: 1;
    grid-column-end: 4;
}

</style>




<div class="wrapper_1">

  <div class="box1">1</div>

  <div class="box2">2</div>
  <div class="box3">3</div>

  <div class="box4">4</div>
  <div class="box5">5</div>
  <div class="box6">6</div>

  <div class="box7">7</div>
  <div class="box8">8</div>

  <div class="box9">9</div>

</div>



                <script>// Write JavaScript here</script>
            
        
    </body>
