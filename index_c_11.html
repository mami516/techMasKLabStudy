<!DOCTYPE html>
<html>
<head>

            <body>
                


<meta charset="UTF-8">
<title>index_c_11</title>

<style>

/* 全体 */
body{
  font-family: "メイリオ", sans-serif;
  background-color: #f7f7f7;
}

/* タブ全体 */
.tab_wrap{
  width: 500px;
  margin: 50px auto;
}

/* ラジオボタンを消す */
input[type="radio"]{
  display: none;
}

/* タブのラベル */
.tab_area label{
  width: 150px;
  margin: 0 5px;
  display: inline-block;
  padding: 12px 0;
  color: #999;
  background: #ddd;
  text-align: center;
  font-size: 14px;
  cursor: pointer;
  transition: ease 0.2s opacity;
}

/* パネル */
.tab_panel{
  display: none;
  background: #fff;
  padding: 30px;
  margin-top: 10px;
  border: 2px solid #ddd;
}

/* タブ1 */
#tab1:checked ~ .tab_area .tab1_label{
  background: #fff;
  color: #000;
}

#tab1:checked ~ .panel_area #panel1{
  display: block;
}

/* タブ2 */
#tab2:checked ~ .tab_area .tab2_label{
  background: #fff;
  color: #000;
}

#tab2:checked ~ .panel_area #panel2{
  display: block;
}

/* タブ3 */
#tab3:checked ~ .tab_area .tab3_label{
  background: #fff;
  color: #000;
}

#tab3:checked ~ .panel_area #panel3{
  display: block;
}

</style>




<div class="tab_wrap">

  <!-- ラジオボタン -->
  <input id="tab1" type="radio" name="tab_btn" checked="">
  <input id="tab2" type="radio" name="tab_btn">
  <input id="tab3" type="radio" name="tab_btn">

  <!-- タブ -->
  <div class="tab_area">
    <label class="tab1_label" for="tab1">タブ1</label>
    <label class="tab2_label" for="tab2">タブ2</label>
    <label class="tab3_label" for="tab3">タブ3</label>
  </div>

  <!-- 表示内容 -->
  <div class="panel_area">

    <div id="panel1" class="tab_panel">
      <p>タブ1の内容です。</p>
      <p>ここに好きな文章を書けます。</p>
    </div>

    <div id="panel2" class="tab_panel">
      <p>タブ2の内容です。</p>
      <p>画像や文章も入れられます。</p>
    </div>

    <div id="panel3" class="tab_panel">
      <p>タブ3の内容です。</p>
      <p>切り替え表示できました！</p>
    </div>

  </div>

</div>

    </body>
